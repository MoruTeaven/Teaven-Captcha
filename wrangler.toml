name = "teaven-captcha"
main = "src/index.ts"
compatibility_date = "2026-06-11"
workers_dev = true

[vars]
APP_ENV = "development"
API_BASE_URL = "http://localhost:8787"
CORS_ORIGIN = "*"
SECRET_ENCRYPTION_KEY = "dev-only-change-this-secret-encryption-key"
SESSION_SECRET = "dev-only-change-this-session-secret"

[[d1_databases]]
binding = "DB"
database_name = "teaven-captcha"
database_id = "00000000-0000-0000-0000-000000000000"
